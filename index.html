<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galatea · 个人主页</title>
  <link rel="preload" href="./assets/STCAIYUN.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    /* 引入华文彩云字体 */
    @font-face {
      font-family: 'STCaiyun';
      src: url('./assets/STCAIYUN.woff2') format('woff2'),
           url('./assets/STCAIYUN.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0716;
      --pink: #ff3388;
      --cyan: #00ddff;
      --purple: #9955dd;
      --light-pink: #ff99cc;
      --white: #f0f0ff;
      --dim-pink: rgba(255,51,136,0.4);
      --dim-cyan: rgba(0,221,255,0.4);
      --dim-purple: #ffbe6e;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    html { scroll-behavior: smooth; scroll-snap-type: y mandatory; overflow-y: scroll; }
    .page {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .page.hidden {
      opacity: 0.3;
      transform: translateY(20px);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--white);
      line-height: 1.7;
      overflow: hidden;
      height: 100vh;
    }

    .scroll-wrap {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }
    .page {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
    }

    .mono {
      font-family: "Consolas", "Monaco", monospace;
    }

    /* ===== 赛博霓虹边框（完全空心不挡内容） ===== */
    .cyber-border {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      border: 4px solid transparent;
      border-radius: 8px;
      background: 
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--pink), var(--cyan), var(--purple), var(--pink)) border-box;
      /* 强制中间100%透明，只留边框 */
      -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      animation: borderGlow 5s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes borderGlow {
      0%,100% { filter: drop-shadow(0 0 6px rgba(255,51,136,0.1)); }
      50% { filter: drop-shadow(0 0 12px rgba(0,221,255,0.1)); }
    }
    /* 边角装饰（z-index降到0，在内容下方） */
    .corner {
      position: fixed; width: 36px; height: 36px; z-index: 0; pointer-events: none;
      border: 2px solid var(--pink);
      opacity: 0.5;
    }
    .corner-tl { top: 6px; left: 6px; border-right: none; border-bottom: none; }
    .corner-tr { top: 6px; right: 6px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 6px; left: 6px; border-right: none; border-top: none; }
    .corner-br { bottom: 6px; right: 6px; border-left: none; border-top: none; }
    .corner .dot {
      position: absolute; width: 4px; height: 4px; background: var(--cyan); border-radius: 50%;
      opacity: 0.8;
      animation: dotBlink 2s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .corner-tl .dot { bottom: 4px; right: 4px; animation-delay: 0s; }
    .corner-tr .dot { bottom: 4px; left: 4px; animation-delay: 0.5s; }
    .corner-bl .dot { top: 4px; right: 4px; animation-delay: 1s; }
    .corner-br .dot { top: 4px; left: 4px; animation-delay: 1.5s; }

    /* ===== 星尘粒子画布 ===== */
    #particle-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ===== Spasmodic背景 ===== */
    .bg {
      position: fixed; inset: 0; z-index: -2;
      background:
        linear-gradient(135deg, rgba(13,7,22,0.55), rgba(13,7,22,0.6)),
        url('./assets/bg-cyberpunk.jpg') center/cover no-repeat;
      filter: blur(3px);
      animation: bgBrightness 6s ease-in-out infinite alternate;
    }
    @keyframes bgBrightness {
      0% { filter: blur(3px) brightness(0.35); }
      100% { filter: blur(3px) brightness(1.3); }
    }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
      animation: bgBreath 6s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes bgBreath {
      0% { opacity: 0.92; }
      100% { opacity: 0.05; }
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,51,136,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,221,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black, transparent 70%);
    }

    .container { max-width: 720px; margin: 0 auto; padding: 16px 20px; position: relative; z-index: 10; width: 100%; }

    /* ===== 第一页放大 + 动画 + 呼吸灯 ===== */
    #page-1 .container { max-width: 860px; }
    #page-1 .hero { margin-bottom: 20px; }
    #page-1 .hero .title-wrap {
      padding: 40px 28px 30px;
      transform: rotate(-0.8deg);
    }
    #page-1 .hero .galatea {
      font-size: 68px;
      letter-spacing: 24px;
    }
    #page-1 .hero .sub {
      font-size: 15px;
      letter-spacing: 10px;
      margin-top: 12px;
    }
    #page-1 .hero .desc {
      font-size: 17px;
      margin-top: 14px;
    }
    #page-1 .tags {
      gap: 12px;
      margin: 28px 0;
    }
    #page-1 .tags .tag {
      font-size: 14px;
      padding: 8px 26px;
      letter-spacing: 4px;
    }

    /* ===== 第一页呼吸灯边框（空心立体） ===== */
    #page-1 .container {
      position: relative;
      border: none;
      background: none;
    }
    /* 实际渐变边框（mask-composite 只留边框区域） */
    #page-1 .container::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      border: 3px solid transparent;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--pink), var(--cyan), var(--purple), var(--light-pink), var(--pink)) border-box;
      background-size: 300% 300%;
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      z-index: -2;
      pointer-events: none;
      animation: borderBreathe 5s ease-in-out infinite;
    }
    /* 外发光层 — 立体感 */
    #page-1 .container::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--pink), var(--cyan), var(--purple));
      background-size: 300% 300%;
      z-index: -3;
      filter: blur(14px);
      opacity: 0;
      animation: outerGlow 5s ease-in-out infinite;
      pointer-events: none;
    }
    /* 内层高光线 — 立体纵深感 */
    .page-1-inner-edge {
      position: absolute;
      inset: 2px;
      border-radius: 12px;
      border: 1px solid transparent;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(225deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02), transparent) border-box;
      z-index: -1;
      pointer-events: none;
      opacity: 0;
      animation: innerEdge 5s ease-in-out infinite;
    }
    @keyframes borderBreathe {
      0%, 100% { background-position: 0% 50%; filter: drop-shadow(0 0 3px rgba(255,51,136,0.15)); }
      25% { filter: drop-shadow(0 0 6px rgba(0,221,255,0.2)) drop-shadow(0 0 14px rgba(255,51,136,0.12)); }
      50% { background-position: 100% 50%; filter: drop-shadow(0 0 8px rgba(0,221,255,0.3)) drop-shadow(0 0 20px rgba(255,51,136,0.15)) drop-shadow(0 0 32px rgba(153,85,221,0.1)); }
      75% { filter: drop-shadow(0 0 6px rgba(0,221,255,0.2)) drop-shadow(0 0 14px rgba(255,51,136,0.12)); }
    }
    @keyframes outerGlow {
      0%, 100% { opacity: 0; }
      25% { opacity: 0.2; }
      50% { opacity: 0.35; background-position: 100% 50%; }
      75% { opacity: 0.2; }
    }
    @keyframes innerEdge {
      0%, 100% { opacity: 0; }
      25% { opacity: 0.15; }
      50% { opacity: 0.3; }
      75% { opacity: 0.15; }
    }

    /* 入场动画：淡入 + 上浮（通过 .animate-in 控制，每次进入都重播） */
    #page-1 .container > * {
      opacity: 0;
      transform: translateY(36px);
    }
    #page-1.animate-in .container > * {
      animation: fadeFlyIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    #page-1.animate-in .hero  { animation-delay: 0.15s; }
    #page-1.animate-in .tags  { animation-delay: 0.55s; }
    #page-1.animate-in .tags .tag {
      opacity: 0;
      transform: translateY(20px) skewX(-4deg);
      animation: tagPopIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    #page-1.animate-in .tags .tag:nth-child(1) { animation-delay: 0.70s; }
    #page-1.animate-in .tags .tag:nth-child(2) { animation-delay: 0.80s; }
    #page-1.animate-in .tags .tag:nth-child(3) { animation-delay: 0.90s; }
    #page-1.animate-in .tags .tag:nth-child(4) { animation-delay: 1.00s; }
    #page-1.animate-in .tags .tag:nth-child(5) { animation-delay: 1.10s; }

    @keyframes fadeFlyIn {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes tagPopIn {
      to { opacity: 1; transform: translateY(0) skewX(-4deg); }
    }

    /* ===== 主标题 ===== */
    .hero {
      margin-bottom: 32px;
      position: relative;
    }
    .hero .title-wrap {
      position: relative;
      background: linear-gradient(135deg, rgba(255,51,136,0.05), rgba(153,85,221,0.05));
      border: 2px solid rgba(255,51,136,0.1);
      padding: 32px 20px 24px;
      border-radius: 8px;
      backdrop-filter: blur(6px);
      transform: rotate(-1deg);
      box-shadow: 0 0 30px rgba(255,51,136,0.04), 0 0 50px rgba(0,221,255,0.03);
    }
    .hero .galatea {
      font-size: 52px; font-weight: 900; letter-spacing: 18px;
      color: transparent;
      background: linear-gradient(135deg, var(--pink), var(--light-pink), var(--cyan), var(--purple));
      background-clip: text; -webkit-background-clip: text;
      text-shadow: 0 0 25px rgba(255,51,136,0.15), 0 0 40px rgba(0,221,255,0.08);
      text-align: center;
      transform: skewX(2deg);
      line-height: 1;
    }
    .hero .sub {
      font-size: 12px; letter-spacing: 8px; color: var(--light-pink);
      text-align: center; margin-top: 10px;
      transform: skewX(2deg);
      text-shadow: 0 0 12px rgba(255,153,204,0.3);
    }
    .hero .desc {
      text-align: center; font-size: 15px; color: var(--dim-purple);
      margin-top: 10px; transform: skewX(2deg);
      font-family: 'SimSun', '宋体', 'Noto Serif SC', serif;
      font-style: italic;
      animation: descBreathe 4s ease-in-out infinite;
    }
    @keyframes descBreathe {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ===== 标签条 ===== */
    .tags {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
      margin: 24px 0; transform: rotate(-1deg);
    }
    .tags .tag {
      padding: 6px 20px;
      border-radius: 4px;
      font-size: 12px; letter-spacing: 3px;
      transform: skewX(-4deg);
      transition: all 0.2s;
    }
    .tags .tag:hover { filter: brightness(1.4); }
    .tag-pink { background: rgba(255,51,136,0.12); border: 1px solid rgba(255,51,136,0.25); color: var(--light-pink); }
    .tag-cyan { background: rgba(0,221,255,0.12); border: 1px solid rgba(0,221,255,0.25); color: var(--cyan); }
    .tag-purple { background: rgba(153,85,221,0.12); border: 1px solid rgba(153,85,221,0.25); color: #d4bbff; }

    /* ===== 项目卡片 ===== */
    .sec-title {
      font-size: 11px; letter-spacing: 8px;
      color: var(--dim-cyan); margin-bottom: 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .sec-title::after {
      content: ""; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(255,51,136,0.3), transparent);
    }

    .card-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px;
    }
    .card {
      padding: 18px;
      background: rgba(255,255,255,0.015);
      border: 2px solid rgba(255,51,136,0.08);
      border-radius: 6px;
      text-decoration: none; color: inherit;
      position: relative;
      transition: all 0.3s;
      backdrop-filter: blur(6px);
      overflow: hidden;
    }
    .card:hover {
      border-color: rgba(0,221,255,0.25);
      transform: translateY(-4px);
      box-shadow: 0 0 25px rgba(0,221,255,0.08);
    }
    .card:nth-child(odd) { transform: rotate(-1deg); }
    .card:nth-child(even) { transform: rotate(1deg); }
    .card:hover:nth-child(odd), .card:hover:nth-child(even) { transform: rotate(0deg) translateY(-4px); }

    .card .name { font-size: 16px; font-weight: 600; color: var(--white); }
    .card .desc { font-size: 12px; color: var(--cyan); margin-top: 3px; }
    .card .dots {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 4px;
    }
    .card .dots span {
      width: 4px; height: 4px; border-radius: 50%;
    }
    .card .dots span:nth-child(1) { background: var(--pink); }
    .card .dots span:nth-child(2) { background: var(--purple); }
    .card .dots span:nth-child(3) { background: var(--cyan); }

    /* ===== 统计条 ===== */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      margin-bottom: 28px;
      transform: rotate(-1deg);
    }
    .stats .s {
      padding: 16px 8px; text-align: center;
      border: 1px solid rgba(153,85,221,0.08);
      background: rgba(153,85,221,0.03);
      backdrop-filter: blur(4px);
      border-radius: 2px;
    }
    .stats .s .num {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, var(--light-pink), var(--pink));
      background-clip: text; -webkit-background-clip: text; color: transparent;
      text-shadow: 0 0 12px rgba(255,153,204,0.08);
    }
    .stats .s .lbl {
      font-size: 10px; color: var(--dim-purple);
      letter-spacing: 2px; margin-top: 3px;
    }

    /* ===== 密码门 ===== */
    .door {
      margin-top: 20px;
      border: 2px solid rgba(0,221,255,0.08);
      background: rgba(0,221,255,0.03);
      padding: 28px 24px; text-align: center;
      position: relative;
      transform: rotate(-0.5deg);
      backdrop-filter: blur(6px);
      border-radius: 6px;
    }
    .door .glow-bar {
      position: absolute; top: 0; left: 15%; width: 70%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), transparent);
      filter: blur(3px);
    }
    .door .hint {
      font-size: 12px; color: var(--dim-cyan); margin-bottom: 14px;
    }
    .door .hint span { color: var(--pink); text-shadow: 0 0 8px rgba(255,51,136,0.2); }
    .key-box { display: flex; gap: 8px; max-width: 400px; margin: 0 auto; }
    .key-box input {
      flex: 1; padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,51,136,0.1);
      color: var(--cyan); font-size: 16px; outline: none;
      letter-spacing: 6px;
      border-radius: 2px;
    }
    .key-box input:focus { border-color: var(--cyan); box-shadow: 0 0 16px rgba(0,221,255,0.12); }
    .key-box button {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; border: none; cursor: pointer;
      font-size: 12px; letter-spacing: 4px;
      transition: all 0.2s;
      border-radius: 2px;
    }
    .key-box button:hover { filter: brightness(1.3); box-shadow: 0 0 18px rgba(255,51,136,0.12); }
    .key-err { font-size: 11px; color: var(--pink); display: none; margin-top: 8px; }

    /* ===== Footer ===== */
    .foot {
      margin-top: 32px; padding-top: 14px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.02);
    }
    .foot a {
      color: var(--dim-purple); text-decoration: none;
      font-size: 12px; margin-right: 18px; transition: color 0.2s;
    }
    .foot a:hover { color: var(--cyan); }
    .foot .cp {
      font-size: 10px; color: rgba(240,240,255,0.08);
    }

    @media (max-width: 520px) {
      .page { padding: 16px; }
      .container { padding: 16px 12px; }
      #page-1 .hero .galatea { font-size: 34px; letter-spacing: 10px; }
      #page-1 .hero .sub { font-size: 12px; letter-spacing: 6px; }
      #page-1 .hero .desc { font-size: 14px; }
      #page-1 .tags .tag { font-size: 11px; padding: 6px 16px; letter-spacing: 2px; }
      .card-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .corner, .cyber-border { display: none; }
    }

    /* ===== 鼠标光晕 ===== */
    .cursor-glow {
      position: fixed;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, 
        rgba(255,51,136,0.2) 0%,
        rgba(255,153,204,0.1) 20%,
        rgba(0,221,255,0.06) 40%,
        transparent 65%
      );
      pointer-events: none;
      z-index: 5;
      transform: translate(-50%, -50%);
      transition: left 0.15s ease-out, top 0.15s ease-out;
      mix-blend-mode: screen;
      filter: blur(20px);
    }

    /* ===== CRT 扫描线 ===== */
    .scanlines {
      position: fixed; inset: 0;
      z-index: 3;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* ===== 第一页浮动动画 ===== */
    #page-1 .hero .title-wrap {
      animation: float 6s ease-in-out infinite;
    }
    #page-1 .tags {
      animation: floatReverse 7s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: rotate(-0.8deg) translateY(0); }
      50% { transform: rotate(-0.8deg) translateY(-8px); }
    }
    @keyframes floatReverse {
      0%,100% { transform: rotate(-1deg) translateY(0); }
      50% { transform: rotate(-1deg) translateY(6px); }
    }

    /* ===== GALATEA 标题微闪 ===== */
    @keyframes glitch {
      0%, 44%, 50%, 94%, 100% { opacity: 1; transform: skewX(2deg) translate(0); text-shadow: 0 0 25px rgba(255,51,136,0.15), 0 0 40px rgba(0,221,255,0.08); }
      46% { opacity: 0.9; transform: skewX(2deg) translate(-2px, 1px); text-shadow: 2px 0 var(--cyan), -2px 0 var(--pink); }
      48% { opacity: 0.95; transform: skewX(2deg) translate(2px, -1px); text-shadow: -2px 0 var(--cyan), 2px 0 var(--pink); }
      96% { opacity: 0.9; transform: skewX(2deg) translate(-2px, 1px); text-shadow: 2px 0 var(--cyan), -2px 0 var(--pink); }
      98% { opacity: 0.95; transform: skewX(2deg) translate(2px, -1px); text-shadow: -2px 0 var(--cyan), 2px 0 var(--pink); }
    }
    #page-1.animate-in .hero .galatea {
      animation: fadeFlyIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards, glitch 4s ease-in-out 1s infinite;
    }

    /* ===== 第二页霓虹灯牌目录 ===== */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
    }
    #page-2 .container { max-width: 820px; width: 100%; }

    /* 第二页灯牌入场动画 */
    @keyframes signSlideInLeft {
      0% { opacity: 0; transform: translateX(-80px) scale(0.9); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes signSlideInRight {
      0% { opacity: 0; transform: translateX(80px) scale(0.9); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes signSlideInUp {

<script>
// 星辰粒子特效 + 星云光晕 + 鼠标互动
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const particleCount = 250;
const mouse = { x: -999, y: -999, radius: 180 };
let time = 0;

// 粒子颜色池
const palette = ['#ff3388', '#00ddff', '#9955dd', '#f0f0ff', '#ff99cc', '#ff66aa', '#66eeff'];

// 星云光晕（背景流动的色块）
const nebulae = [];
for (let i = 0; i < 6; i++) {
  nebulae.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: 180 + Math.random() * 280,
    color: ['rgba(255,51,136,', 'rgba(0,221,255,', 'rgba(153,85,221,', 'rgba(255,153,204,'][i % 4],
    opacity: 0.15 + Math.random() * 0.15,
    speedX: (Math.random() - 0.5) * 0.15,
    speedY: (Math.random() - 0.5) * 0.15,
    phase: Math.random() * Math.PI * 2
  });
}

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3 + 0.5;
    this.baseSize = this.size;
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.speedY = (Math.random() - 0.5) * 0.6;
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.phase = Math.random() * Math.PI * 2;
    this.twinkleSpeed = 0.02 + Math.random() * 0.04;
    this.opacity = 0.4 + Math.random() * 0.6;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.phase += this.twinkleSpeed;
    // 闪烁
    this.size = this.baseSize + Math.sin(this.phase) * 0.4;
    this.currentOpacity = this.opacity * (0.7 + Math.sin(this.phase) * 0.3);

    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;

    // 鼠标交互
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < mouse.radius && dist > 0) {
      const force = (mouse.radius - dist) / mouse.radius;
      this.x += (dx / dist) * force * 3;
      this.y += (dy / dist) * force * 3;
    }
  }
  draw() {
    ctx.globalAlpha = this.currentOpacity;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = this.size * 8;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

// 流星 — 统一从右上往左下划过
let shootingStars = [];
function spawnShootingStar() {
  if (Math.random() < 0.04 && shootingStars.length < 2) {
    const angle = Math.random() * 0.3 + 0.35; // 35°~55° 斜角
    const speed = 7 + Math.random() * 4;
    
    // 从右上区域出发（顶部或右侧）
    const fromRight = Math.random() > 0.5;
    let x, y, vx, vy;
    if (fromRight) {
      x = canvas.width + 20 + Math.random() * 60;
      y = Math.random() * canvas.height * 0.5;
    } else {
      x = Math.random() * canvas.width * 0.5 + canvas.width * 0.3;
      y = -20 - Math.random() * 40;
    }
    vx = -Math.cos(angle) * speed;
    vy = Math.sin(angle) * speed;
    
    shootingStars.push({
      x, y, vx, vy,
      length: 80 + Math.random() * 60,
      color: ['#f0f0ff', '#ff99cc', '#66eeff'][Math.floor(Math.random() * 3)]
    });
  }
}

for (let i = 0; i < particleCount; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  time += 0.005;

  // 1. 画星云背景
  nebulae.forEach(n => {
    n.x += n.speedX + Math.sin(time + n.phase) * 0.1;
    n.y += n.speedY + Math.cos(time + n.phase) * 0.1;
    // 边界循环
    if (n.x < -n.radius) n.x = canvas.width + n.radius;
    if (n.x > canvas.width + n.radius) n.x = -n.radius;
    if (n.y < -n.radius) n.y = canvas.height + n.radius;
    if (n.y > canvas.height + n.radius) n.y = -n.radius;

    const gradient = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
    gradient.addColorStop(0, n.color + n.opacity + ')');
    gradient.addColorStop(0.4, n.color + (n.opacity * 0.4) + ')');
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  });

  // 2. 画粒子连线
  for (let a = 0; a < particles.length; a++) {
    for (let b = a + 1; b < particles.length; b++) {
      const dx = particles[a].x - particles[b].x;
      const dy = particles[a].y - particles[b].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const alpha = (1 - dist / 120) * 0.2;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(200,200,255,${alpha})`;
        ctx.lineWidth = 0.4;
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }

  // 3. 画粒子
  particles.forEach(p => { p.update(); p.draw(); });

  // 4. 画流星
  spawnShootingStar();
  shootingStars = shootingStars.filter(s => {
    s.x += s.vx;
    s.y += s.vy;
    // 完全离开画面才消失
    if (s.x < -200 || s.x > canvas.width + 200 || s.y > canvas.height + 200 || s.y < -200) return false;

    const gradient = ctx.createLinearGradient(s.x, s.y, s.x - s.vx / Math.hypot(s.vx, s.vy) * s.length, s.y - s.vy / Math.hypot(s.vx, s.vy) * s.length);
    gradient.addColorStop(0, s.color + '80');
    gradient.addColorStop(0.6, s.color + '20');
    gradient.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx / Math.hypot(s.vx, s.vy) * s.length, s.y - s.vy / Math.hypot(s.vx, s.vy) * s.length);
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 8;
    ctx.shadowColor = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.shadowBlur = 0;
    return true;
  });

  requestAnimationFrame(animate);
}
animate();

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

    }
  });
}, { threshold: 0.3 });

<script>
// 翻页过渡动画
const fadeObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.remove('hidden');
    } else {
      entry.target.classList.add('hidden');
    }
  });
}, { threshold: 0.2 });

document.querySelectorAll('.page').forEach(page => {
  fadeObserver.observe(page);
});

// 第二页灯牌入场动画
const page2 = document.getElementById('page-2');

  entries.forEach(entry => {
    if (entry.isIntersecting) {
      page2.classList.remove('animate-in');
      void page2.offsetWidth;
      page2.classList.add('animate-in');
    }
  });
}, { threshold: 0.3 });
signObserver.observe(page2);
</script>
