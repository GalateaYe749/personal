<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Galatea · 私藏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sakura: #e87a92;
      --sakura-light: #f2b6c5;
      --ink: #2d2a2e;
      --ink-light: #6b6569;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "STKaiti", serif;
      background: #f5f0f2;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* ── 背景图 + 高不透明度白底 ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        url('../../assets/66aa67b0e10780fbf6581569d75cc654.png') center/cover no-repeat;
      animation: bgZoom 16s ease-in-out infinite alternate;
      filter: brightness(0.95);
    }
    .white-layer {
      position: fixed; inset: 0; z-index: -1;
      background: rgba(250,247,248,0.72);
      pointer-events: none;
    }

    @keyframes bgZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.06); }
    }

    /* ── 樱花瓣 ── */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    /* ── 内容 ── */
    .container {
      max-width: 600px; text-align: center;
      position: relative; z-index: 20;
      padding: 40px 32px;
    }
    h1 {
      font-size: 40px; font-weight: 900; letter-spacing: 16px;
      background: linear-gradient(135deg, var(--sakura), #c08a9a);
      background-clip: text; -webkit-background-clip: text; color: transparent;
      margin-bottom: 12px;
      text-shadow: 0 0 40px rgba(232,122,146,0.15);
    }
    .sub {
      color: var(--ink-light); font-size: 13px; letter-spacing: 8px;
      margin-bottom: 24px;
      font-family: "Noto Sans SC", "STKaiti", serif;
    }
    .empty-hint {
      font-size: 14px; color: var(--ink-light); letter-spacing: 4px;
      margin-bottom: 40px; font-style: italic;
    }
    .back {
      display: inline-block;
      padding: 10px 32px;
      border: 1px solid rgba(232,122,146,0.3);
      color: var(--ink-light); text-decoration: none;
      font-size: 13px; letter-spacing: 5px; border-radius: 24px;
      transition: all 0.3s;
    }
    .back:hover {
      border-color: var(--sakura);
      color: var(--sakura);
      background: rgba(232,122,146,0.06);
    }
  </style>
</head>
<body>

  <!-- 高不透明度白底 -->
  <div class="white-layer"></div>

  <!-- 内容 -->
  <div class="container">
    <h1>GALATEA</h1>
    <p class="sub">✦ 私藏空间 ✦</p>
    <p class="empty-hint">这里还没有内容，等待填充……</p>
    <a href="../../" class="back" id="backLink">← 返回</a>
  </div>

  <script>
    // ── 生成樱花瓣 ──
    (function createPetals() {
      const petalCount = 35;
      const body = document.body;
      for (let i = 0; i < petalCount; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const size = 8 + Math.random() * 12;
        const startX = Math.random() * 100;
        const duration = 10 + Math.random() * 10;
        const delay = Math.random() * 25;
        const hue = 330 + Math.random() * 20;
        const sat = 50 + Math.random() * 30;
        const light = 75 + Math.random() * 15;
        const petalOpacity = 0.4 + Math.random() * 0.4;
        const btr1 = 40 + Math.random() * 30;
        const bbr1 = 40 + Math.random() * 30;
        petal.style.cssText = `
          left: ${startX}vw;
          top: -30px;
          width: ${size}px;
          height: ${size * (0.7 + Math.random() * 0.5)}px;
          background: hsla(${hue}, ${sat}%, ${light}%, ${petalOpacity});
          border-radius: ${btr1}% 0 ${bbr1}% 0;
          animation: petalAnim${i} ${duration}s ${delay}s infinite;
        `;
        const rotateEnd = 180 + Math.random() * 540;
        const driftX = -30 + Math.random() * 60;
        const midDrift = driftX * 0.5 + (Math.random() - 0.5) * 20;
        const style = document.createElement('style');
        style.textContent = `
          @keyframes petalAnim${i} {
            0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            5%   { opacity: ${petalOpacity}; }
            50%  { transform: translateY(50vh) translateX(${midDrift}px) rotate(${rotateEnd * 0.5}deg); opacity: ${petalOpacity}; }
            90%  { opacity: ${petalOpacity}; }
            100% { transform: translateY(105vh) translateX(${driftX}px) rotate(${rotateEnd}deg); opacity: 0; }
          }`;
        document.head.appendChild(style);
        body.appendChild(petal);
      }
    })();
  </script>

</body>
</html>
