<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Galatea · 私藏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sakura: #e87a92;
      --sakura-light: #f2b6c5;
      --ink: #2d2a2e;
      --ink-light: #6b6569;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "STKaiti", serif;
      background: #f5f0f2;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* 背景图 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        url('../../assets/66aa67b0e10780fbf6581569d75cc654.png') center/cover no-repeat;
      animation: bgZoom 16s ease-in-out infinite alternate;
      filter: brightness(0.95);
    }
    .white-layer {
      position: fixed; inset: 0; z-index: -1;
      background: rgba(250,247,248,0.72);
      pointer-events: none;
    }

    @keyframes bgZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.06); }
    }

    /* 樱花瓣基础样式 */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      border-radius: 50% 0 50% 0;
      opacity: 0;
    }

    /* 内容 */
    .container {
      max-width: 600px; text-align: center;
      position: relative; z-index: 20;
      padding: 40px 32px;
    }
    h1 {
      font-size: 40px; font-weight: 900; letter-spacing: 16px;
      background: linear-gradient(135deg, var(--sakura), #c08a9a);
      background-clip: text; -webkit-background-clip: text; color: transparent;
      margin-bottom: 12px;
      text-shadow: 0 0 40px rgba(232,122,146,0.15);
    }
    .sub {
      color: var(--ink-light); font-size: 13px; letter-spacing: 8px;
      margin-bottom: 24px;
      font-family: "Noto Sans SC", "STKaiti", serif;
    }
    .empty-hint {
      font-size: 14px; color: var(--ink-light); letter-spacing: 4px;
      margin-bottom: 40px; font-style: italic;
    }
    .back {
      display: inline-block;
      padding: 10px 32px;
      border: 1px solid rgba(232,122,146,0.3);
      color: var(--ink-light); text-decoration: none;
      font-size: 13px; letter-spacing: 5px; border-radius: 24px;
      transition: all 0.3s;
    }
    .back:hover {
      border-color: var(--sakura);
      color: var(--sakura);
      background: rgba(232,122,146,0.06);
    }
  </style>
</head>
<body>

  <div class="white-layer"></div>

  <div class="container">
    <h1>GALATEA</h1>
    <p class="sub">✦ 私藏空间 ✦</p>
    <p class="empty-hint">这里还没有内容，等待填充……</p>
    <a href="../../" class="back" id="backLink">← 返回</a>
  </div>

  <script>
    // ── 持续飘落的樱花瓣（55片）──
    (function() {
      const n = 55, b = document.body;
      for (let i = 0; i < n; i++) {
        const el = document.createElement('div');
        el.className = 'petal';
        const sz = 6 + Math.random() * 14;
        const x = Math.random() * 110 - 5;
        const dur = 12 + Math.random() * 10;
        const del = Math.random() * 30;
        const h = 325 + Math.random() * 25, s = 50 + Math.random() * 30, l = 72 + Math.random() * 18;
        const op = 0.35 + Math.random() * 0.45;
        const bt = 35 + Math.random() * 35, bb = 35 + Math.random() * 35;
        const tall = Math.random() > 0.5;
        el.style.cssText = `left:${x}vw;top:-40px;width:${sz}px;height:${tall?sz*(0.9+Math.random()*0.6):sz*(0.6+Math.random()*0.4)}px;background:hsla(${h},${s}%,${l}%,${op});border-radius:${bt}% 0 ${bb}% 0;animation:pa${i} ${dur}s ${del}s infinite`;

        const td = -40 + Math.random() * 80;
        const p25 = td*0.3+(Math.random()-0.5)*25, p50 = td*0.6+(Math.random()-0.5)*20, p75 = td*0.85+(Math.random()-0.5)*15;
        const r1 = 60+Math.random()*120, r2 = r1+40+Math.random()*100, r3 = r2+30+Math.random()*80, r4 = r3+60+Math.random()*180;
        const tf = ['ease-in-out','ease-out','linear'][Math.floor(Math.random()*3)];
        const st = document.createElement('style');
        st.textContent = `@keyframes pa${i}{0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}5%{opacity:${op}}25%{transform:translateY(25vh) translateX(${p25}px) rotate(${r1}deg);opacity:${op};animation-timing-function:${tf}}50%{transform:translateY(50vh) translateX(${p50}px) rotate(${r2}deg);opacity:${op};animation-timing-function:${tf}}75%{transform:translateY(78vh) translateX(${p75}px) rotate(${r3}deg);opacity:${op};animation-timing-function:${tf}}95%{opacity:${op*0.6}}100%{transform:translateY(108vh) translateX(${td}px) rotate(${r4}deg);opacity:0}}`;
        document.head.appendChild(st);
        b.appendChild(el);
      }
    })();

    // ── 时不时触发特效（樱花漩涡 / 花瓣暴雨）──
    (function() {
      const b = document.body;
      let sid = 0;

      function rpp() {
        const sz = 6 + Math.random() * 14;
        return {w:sz, h:sz*(0.6+Math.random()*0.5), bg:`hsla(${320+Math.random()*30},${50+Math.random()*30}%,${70+Math.random()*20}%,${0.35+Math.random()*0.5})`, bt:35+Math.random()*35, bb:35+Math.random()*35};
      }

      // 特效1: 樱花漩涡
      function swirl() {
        const n = 20, cx = 15 + Math.random() * 70, id = 's' + (sid++), d = 3.5 + Math.random() * 1.5;
        for (let i = 0; i < n; i++) {
          const p = rpp(), el = document.createElement('div');
          el.className = 'petal';
          const ang = (i / n) * 360, rad = 10 + Math.random() * 25, sd = (i / n) * 0.3, rise = 30 + Math.random() * 20;
          el.style.cssText = `left:${cx}vw;top:${40+Math.random()*20}vh;width:${p.w}px;height:${p.h}px;background:${p.bg};border-radius:${p.bt}% 0 ${p.bb}% 0;animation:${id}_${i} ${d}s ${sd}s ease-in-out 1 forwards`;

          const st = document.createElement('style');
          const a1 = ang, a2 = ang + 120, a3 = ang + 240, a4 = ang + 360;
          const rIn = rad * 0.6;
          st.textContent = `@keyframes ${id}_${i}{0%{transform:translate(0,0) rotate(${a1}deg);opacity:0}10%{opacity:0.7}30%{transform:translate(${Math.cos(a1*Math.PI/180)*rad}px,${-rise*0.3}px) rotate(${a2}deg);opacity:0.8}55%{transform:translate(${Math.cos(a2*Math.PI/180)*rIn}px,${-rise*0.6}px) rotate(${a3}deg);opacity:0.7}80%{transform:translate(${Math.cos(a3*Math.PI/180)*(rad*0.4)}px,${-rise*0.85}px) rotate(${a4}deg);opacity:0.5}100%{transform:translate(0,${-rise}px) rotate(${a4+180}deg);opacity:0}}`;
          document.head.appendChild(st);
          b.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, (d + sd) * 1000 + 100);
        }
      }

      // 特效2: 樱花暴雨
      function burst() {
        const n = 30 + Math.floor(Math.random() * 15), id = 'b' + (sid++), d = 4 + Math.random() * 2;
        for (let i = 0; i < n; i++) {
          const p = rpp(), el = document.createElement('div');
          el.className = 'petal';
          const sx = Math.random() * 100, dr = -50 + Math.random() * 100, dl = Math.random() * 1.5, re = 180 + Math.random() * 540;
          el.style.cssText = `left:${sx}vw;top:-30px;width:${p.w}px;height:${p.h}px;background:${p.bg};border-radius:${p.bt}% 0 ${p.bb}% 0;animation:${id}_${i} ${d}s ${dl}s ease-out 1 forwards`;

          const md = dr*0.5+(Math.random()-0.5)*20;
          const st = document.createElement('style');
          st.textContent = `@keyframes ${id}_${i}{0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}5%{opacity:0.8}50%{transform:translateY(55vh) translateX(${md}px) rotate(${re*0.5}deg);opacity:0.7}90%{opacity:0.4}100%{transform:translateY(108vh) translateX(${dr}px) rotate(${re}deg);opacity:0}}`;
          document.head.appendChild(st);
          b.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, (d + dl) * 1000 + 100);
        }
      }

      function next() {
        setTimeout(() => {
          Math.random() < 0.45 ? swirl() : burst();
          next();
        }, 12000 + Math.random() * 20000);
      }
      next();
    })();
  </script>

</body>
</html>
