<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Galatea · 私藏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sakura: #e87a92;
      --sakura-light: #f2b6c5;
      --ink: #2d2a2e;
      --ink-light: #6b6569;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "STKaiti", serif;
      background: #f5f0f2;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* 背景图 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        url('../../assets/66aa67b0e10780fbf6581569d75cc654.png') center/cover no-repeat;
      animation: bgZoom 16s ease-in-out infinite alternate;
      filter: brightness(0.95);
    }
    .white-layer {
      position: fixed; inset: 0; z-index: -1;
      background: rgba(250,247,248,0.72);
      pointer-events: none;
    }

    @keyframes bgZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.06); }
    }

    /* 樱花瓣基础样式 */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
    }

    /* 内容 */
    .container {
      max-width: 600px; text-align: center;
      position: relative; z-index: 20;
      padding: 40px 32px;
    }
    h1 {
      font-size: 40px; font-weight: 900; letter-spacing: 16px;
      background: linear-gradient(135deg, var(--sakura), #c08a9a);
      background-clip: text; -webkit-background-clip: text; color: transparent;
      margin-bottom: 12px;
      text-shadow: 0 0 40px rgba(232,122,146,0.15);
    }
    .sub {
      color: var(--ink-light); font-size: 13px; letter-spacing: 8px;
      margin-bottom: 24px;
      font-family: "Noto Sans SC", "STKaiti", serif;
    }
    .empty-hint {
      font-size: 14px; color: var(--ink-light); letter-spacing: 4px;
      margin-bottom: 40px; font-style: italic;
    }
    .back {
      display: inline-block;
      padding: 10px 32px;
      border: 1px solid rgba(232,122,146,0.3);
      color: var(--ink-light); text-decoration: none;
      font-size: 13px; letter-spacing: 5px; border-radius: 24px;
      transition: all 0.3s;
    }
    .back:hover {
      border-color: var(--sakura);
      color: var(--sakura);
      background: rgba(232,122,146,0.06);
    }
  </style>
</head>
<body>

  <div class="white-layer"></div>

  <div class="container">
    <h1>GALATEA</h1>
    <p class="sub">✦ 私藏空间 ✦</p>
    <p class="empty-hint">这里还没有内容，等待填充……</p>
    <a href="../../" class="back" id="backLink">← 返回</a>
  </div>

  <script>
    // ── 持续飘落的樱花瓣（55片，真实下落轨迹）──
    (function() {
      const n = 55, b = document.body;
      for (let i = 0; i < n; i++) {
        const el = document.createElement('div');
        el.className = 'petal';
        const sz = 5 + Math.random() * 15;
        const x = Math.random() * 110 - 5;
        const y = Math.random() * -60;  // 不同起始高度
        const dur = 14 + Math.random() * 12;  // 14-26s 更分散
        const del = Math.random() * 35;
        const h = 320 + Math.random() * 30, s = 45 + Math.random() * 35, l = 68 + Math.random() * 22;
        const op = 0.3 + Math.random() * 0.5;
        // 花瓣形状：不规则五边形感
        const bt = 30 + Math.random() * 40;
        const bb = 30 + Math.random() * 40;

        el.style.cssText =
          `left:${x}vw;top:${y}px;width:${sz}px;height:${sz*(0.5+Math.random()*0.6)}px;` +
          `background:hsla(${h},${s}%,${l}%,${op});border-radius:${bt}% 0 ${bb}% 0;` +
          `animation:pf${i} ${dur}s ${del}s infinite`;

        // 真实樱花瓣下落：6段关键帧，非匀速，带停顿感
        const drift = -50 + Math.random() * 100;
        const pts = [];
        for (let j = 1; j <= 5; j++) {
          const pct = j * 20;
          const yPos = (j / 5) * 100;
          // 非直线漂移，每段随机偏折
          const dx = drift * (j / 5) + (Math.random() - 0.5) * (15 + j * 3);
          const rot = (60 + Math.random() * 120) * j + (Math.random() - 0.5) * 30;
          // 缩放模拟翻转（花瓣翻转时变窄）
          const sx = j % 2 === 0 ? 0.6 + Math.random() * 0.4 : 0.8 + Math.random() * 0.3;
          pts.push(`${pct}%{transform:translateY(${yPos}vh) translateX(${dx}px) rotate(${rot}deg) scaleX(${sx});opacity:${op*(0.7+Math.random()*0.3)};animation-timing-function:${['ease-in-out','ease-out','cubic-bezier(0.25,0.1,0.25,1)'][Math.floor(Math.random()*3)]}}`);
        }

        const st = document.createElement('style');
        st.textContent =
          `@keyframes pf${i}{` +
          `0%{transform:translateY(0) translateX(0) rotate(0deg) scaleX(1);opacity:0}` +
          `3%{opacity:${op}}` +
          pts.join('') +
          `97%{opacity:${op*0.4}}` +
          `100%{transform:translateY(110vh) translateX(${drift}px) rotate(${360+Math.random()*540}deg) scaleX(0.5);opacity:0}}`;
        document.head.appendChild(st);
        b.appendChild(el);
      }
    })();

    // ── 风效：真实樱花旋风 + 花瓣暴雨 ──
    (function() {
      const b = document.body;
      let sid = 0;

      function rpp() {
        const sz = 5 + Math.random() * 15;
        const h = 310 + Math.random() * 35, s = 45 + Math.random() * 35, l = 65 + Math.random() * 25;
        return {
          w: sz, h: sz * (0.5 + Math.random() * 0.6),
          bg: `hsla(${h},${s}%,${l}%,${0.3+Math.random()*0.5})`,
          bt: 30 + Math.random() * 40, bb: 30 + Math.random() * 40
        };
      }

      // ── 特效1：风卷樱花（被风卷起的漩涡）──
      function swirl() {
        const n = 28;
        const cx = 15 + Math.random() * 70;   // 风眼中心
        const id = 'sw' + (sid++);
        const dur = 2.5 + Math.random() * 1.5;   // 2.5-4s
        const spread = 40 + Math.random() * 40; // 扩散范围 (px)

        for (let i = 0; i < n; i++) {
          const p = rpp(), el = document.createElement('div');
          el.className = 'petal';
          const ang = (i / n) * 360;
          // 每片花瓣螺旋半径随高度变化：底部收拢，顶部散开（真实龙卷风形态）
          const rBase = 5 + Math.random() * 15;
          const rTop = spread + Math.random() * 25;
          const sd = (i / n) * 0.25;  // 依次启动
          const rise = 35 + Math.random() * 25;  // 上升高度

          el.style.cssText =
            `left:${cx}vw;top:${50+Math.random()*25}vh;` +
            `width:${p.w}px;height:${p.h}px;background:${p.bg};` +
            `border-radius:${p.bt}% 0 ${p.bb}% 0;` +
            `animation:${id}_${i} ${dur}s ${sd}s ease-in-out 1 forwards`;

          // 螺旋路径：底部小圈→中部扩大→顶部散开被风吹走
          const a1 = ang, a2 = ang + 90, a3 = ang + 180, a4 = ang + 270, a5 = ang + 380;
          const r1 = rBase, r2 = rBase + (rTop - rBase) * 0.3, r3 = rBase + (rTop - rBase) * 0.6;
          const r4 = rTop * 0.85, r5 = rTop * 1.1;

          // 顶部额外水平吹飞偏移
          const blowOffX = -80 + Math.random() * 160;

          const st = document.createElement('style');
          st.textContent =
            `@keyframes ${id}_${i}{` +
            `0%{transform:translate(0,0) rotate(${a1}deg);opacity:0}` +
            `8%{opacity:0.7}` +
            `25%{transform:translate(${Math.cos(a1*Math.PI/180)*r1}px,${-rise*0.2}px) rotate(${a2}deg);opacity:0.85}` +
            `45%{transform:translate(${Math.cos(a2*Math.PI/180)*r2}px,${-rise*0.4}px) rotate(${a3}deg);opacity:0.8}` +
            `62%{transform:translate(${Math.cos(a3*Math.PI/180)*r3}px,${-rise*0.6}px) rotate(${a4}deg);opacity:0.7}` +
            `80%{transform:translate(${Math.cos(a4*Math.PI/180)*r4}px,${-rise*0.8}px) rotate(${a5}deg);opacity:0.5}` +
            `100%{transform:translate(${blowOffX}px,${-rise}px) rotate(${a5+180}deg);opacity:0}}`;
          document.head.appendChild(st);
          b.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.removeChild(el); }, (dur + sd) * 1000 + 200);
        }
      }

      // ── 特效2：一阵狂风（花瓣被风吹散）──
      function burst() {
        const n = 35 + Math.floor(Math.random() * 20);  // 35-54片
        const id = 'bu' + (sid++);
        const dur = 3.5 + Math.random() * 2.5;  // 3.5-6s
        const windDir = Math.random() > 0.5 ? 1 : -1;  // 风向

        for (let i = 0; i < n; i++) {
          const p = rpp(), el = document.createElement('div');
          el.className = 'petal';
          const sx = windDir > 0 ? Math.random() * 30 : 70 + Math.random() * 30;  // 风来的方向
          const drift = windDir * (40 + Math.random() * 80);  // 被风吹走的方向
          const dl = Math.random() * 0.8;
          const fast = Math.random() > 0.6;
          const speed = fast ? 1 : 0.6 + Math.random() * 0.4;

          el.style.cssText =
            `left:${sx}vw;top:${-20-Math.random()*60}px;` +
            `width:${p.w}px;height:${p.h}px;background:${p.bg};` +
            `border-radius:${p.bt}% 0 ${p.bb}% 0;` +
            `animation:${id}_${i} ${dur*speed}s ${dl}s cubic-bezier(0.15,0.5,0.35,1) 1 forwards`;

          // 被风吹的轨迹：急剧侧向偏移 + 旋转
          const re = 200 + Math.random() * 600 * windDir;
          const md = drift * 0.4 + (Math.random() - 0.5) * 25;
          const st = document.createElement('style');
          st.textContent =
            `@keyframes ${id}_${i}{` +
            `0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}` +
            `5%{opacity:0.75}` +
            `35%{transform:translateY(35vh) translateX(${md}px) rotate(${re*0.3}deg);opacity:0.65;animation-timing-function:cubic-bezier(0.2,0.3,0.4,1)}` +
            `65%{transform:translateY(65vh) translateX(${drift*0.7}px) rotate(${re*0.6}deg);opacity:0.5;animation-timing-function:cubic-bezier(0.3,0.2,0.45,1)}` +
            `90%{opacity:0.25}` +
            `100%{transform:translateY(110vh) translateX(${drift}px) rotate(${re}deg);opacity:0}}`;
          document.head.appendChild(st);
          b.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.removeChild(el); }, (dur * speed + dl) * 1000 + 200);
        }
      }

      // ── 定时触发：每隔15-35s──
      function next() {
        setTimeout(() => {
          Math.random() < 0.4 ? swirl() : burst();
          next();
        }, 15000 + Math.random() * 20000);
      }
      next();
    })();
  </script>

</body>
</html>
