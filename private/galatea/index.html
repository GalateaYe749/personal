<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Garden of Avalon · Galatea</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sakura: #e87a92;
      --sakura-light: #f2b6c5;
      --ink: #2d2a2e;
      --ink-light: #6b6569;
    }
    body {
      font-family: "Noto Sans SC", "STKaiti", serif;
      background: #f5f0f2;
      color: var(--ink);
      overflow: hidden;
    }

    /* 背景图固定 + 滚动视差容器 */
    .bg-parallax {
      position: fixed; inset: -60px 0; z-index: -2;
      background: url('../../assets/66aa67b0e10780fbf6581569d75cc654.png') center/cover no-repeat;
      animation: bgZoom 16s ease-in-out infinite alternate;
      filter: brightness(0.95);
      will-change: transform;
      transition: transform 0.3s ease-out;
    }
    .white-layer {
      position: fixed; inset: 0; z-index: -1;
      background: rgba(250,247,248,0.72);
      pointer-events: none;
    }
    @keyframes bgZoom {
      0% { transform: scale(1.05); }
      100% { transform: scale(1.12); }
    }

    /* ── 环境光扫过 ── */
    .light-ray {
      position: fixed; inset: 0; z-index: 3;
      background: linear-gradient(
        135deg,
        transparent 30%,
        rgba(255,230,240,0.06) 45%,
        rgba(255,220,230,0.08) 50%,
        rgba(255,230,240,0.06) 55%,
        transparent 70%
      );
      background-size: 200% 200%;
      animation: lightSweep 12s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes lightSweep {
      0% { background-position: 0% 100%; opacity: 0.4; }
      50% { background-position: 100% 0%; opacity: 1; }
      100% { background-position: 0% 100%; opacity: 0.4; }
    }

    /* ── 翻页容器 ── */
    .pages {
      height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory;
      position: relative; z-index: 10;
    }
    .page {
      height: 100vh; scroll-snap-align: start;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 32px;
      position: relative;
    }

    /* ── 页码指示 ── */
    .page-num {
      position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
      font-family: "Playfair Display", serif;
      color: rgba(107,101,105,0.2); font-size: 13px; letter-spacing: 6px;
      pointer-events: none;
    }

    /* ── 第一页：标题页 ── */
    .page-1 .en-title {
      font-family: "Playfair Display", serif;
      font-size: 42px; font-weight: 400; font-style: italic;
      letter-spacing: 8px;
      color: var(--sakura);
      animation: titleFadeIn 1.2s 0.2s forwards;
      opacity: 0;
      text-shadow: 0 0 40px rgba(232,122,146,0.1);
    }
    .page-1 .divider {
      width: 60px; height: 1px;
      margin: 20px auto;
      background: linear-gradient(90deg, transparent, var(--sakura-light), transparent);
      animation: dividerPulse 4s ease-in-out infinite;
      opacity: 0;
      animation: dividerPulse 4s ease-in-out infinite, fadeIn 1s 0.6s forwards;
    }
    @keyframes dividerPulse {
      0%, 100% { width: 60px; opacity: 0.2; }
      50% { width: 140px; opacity: 0.6; }
    }
    .page-1 .cn-sub {
      font-family: "STKaiti", "KaiTi", "Noto Serif SC", serif;
      font-size: 18px; letter-spacing: 8px;
      color: var(--ink-light);
      font-weight: 300;
      text-shadow: 0 0 20px rgba(232,122,146,0.05);
      opacity: 0;
      animation: fadeInUp 1s 0.8s forwards;
    }
    .page-1 .cn-sub i {
      font-style: italic;
      display: inline-block;
      transform: skewX(-10deg);
    }
    .page-1 .back {
      display: inline-block;
      margin-top: 48px;
      padding: 8px 28px;
      border: 1px solid rgba(232,122,146,0.2);
      color: var(--ink-light); text-decoration: none;
      font-size: 12px; letter-spacing: 5px; border-radius: 20px;
      backdrop-filter: blur(4px);
      opacity: 0;
      animation: fadeIn 0.8s 1.5s forwards;
      transition: all 0.4s;
    }
    .page-1 .back:hover {
      border-color: var(--sakura);
      color: var(--sakura);
      box-shadow: 0 4px 20px rgba(232,122,146,0.1);
      transform: translateY(-1px);
    }

    /* ── 唯美边框 ── */
    .page-1 .frame {
      position: relative;
      padding: 48px 60px 40px;
      border: 1px solid rgba(232,122,146,0.15);
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      box-shadow:
        0 0 20px rgba(232,122,146,0.02),
        inset 0 0 20px rgba(232,122,146,0.01);
      backdrop-filter: blur(4px);
      text-align: center;
      animation: frameGlow 5s ease-in-out infinite alternate;
    }
    /* 外发光轮廓 */
    .page-1 .frame::before {
      content: '';
      position: absolute;
      inset: -3px;
      border: 1px solid rgba(232,122,146,0.08);
      border-radius: 23px;
      pointer-events: none;
    }
    /* 四角装饰 */
    .page-1 .frame::after {
      content: '✦';
      position: absolute;
      top: -9px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: rgba(232,122,146,0.25);
      letter-spacing: 6px;
      background: #f5f0f2;
      padding: 0 10px;
      pointer-events: none;
    }

    /* ── 后续页 ── */
    .page-content {
      text-align: center;
    }
    .page-content .label {
      font-family: "Playfair Display", serif;
      font-size: 14px; font-style: italic;
      color: rgba(107,101,105,0.3); letter-spacing: 6px;
      margin-bottom: 12px;
    }
    .page-content .empty-text {
      font-family: "STKaiti", serif;
      font-size: 15px; color: rgba(107,101,105,0.4);
      letter-spacing: 4px; font-style: italic;
    }

    @keyframes frameGlow {
      0% { box-shadow: 0 0 20px rgba(232,122,146,0.02), inset 0 0 20px rgba(232,122,146,0.01); }
      100% { box-shadow: 0 0 40px rgba(232,122,146,0.08), inset 0 0 40px rgba(232,122,146,0.04); }
    }

    /* ── 后续页入场动画 ── */
    .page:not(.page-1) .page-content {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .page:not(.page-1).visible .page-content {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── 动画 ── */
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes titleFadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── 樱花瓣 ── */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 8;
      opacity: 0;
    }

    /* ── 浮动微尘 ── */
    .dust {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      background: rgba(232,122,146,0.12);
      animation: dustFloat linear infinite;
    }
    @keyframes dustFloat {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
    }

    /* ── 自定义滚动条 ── */
    .pages::-webkit-scrollbar { width: 3px; }
    .pages::-webkit-scrollbar-track { background: transparent; }
    .pages::-webkit-scrollbar-thumb { background: rgba(232,122,146,0.15); border-radius: 2px; }
  </style>
</head>
<body>

  <div class="bg-parallax" id="bgParallax"></div>
  <div class="white-layer"></div>
  <div class="light-ray"></div>

  <div class="pages">

    <!-- 第一页：标题 -->
    <div class="page page-1">
      <div class="frame">
        <div class="en-title">Garden of Avalon</div>
        <div class="divider"></div>
        <div class="cn-sub"><i>永世隔绝的理想乡</i></div>
        <a href="../../" class="back">← 返回</a>
      </div>
      <div class="page-num">— 壹 —</div>
    </div>

    <!-- 后续页：预留内容 -->
    <div class="page">
      <div class="page-content">
        <div class="label">Chapter One</div>
        <p class="empty-text">等待填充……</p>
      </div>
      <div class="page-num">— 貳 —</div>
    </div>

    <div class="page">
      <div class="page-content">
        <div class="label">Chapter Two</div>
        <p class="empty-text">等待填充……</p>
      </div>
      <div class="page-num">— 参 —</div>
    </div>

    <div class="page">
      <div class="page-content">
        <div class="label">Chapter Three</div>
        <p class="empty-text">等待填充……</p>
      </div>
      <div class="page-num">— 肆 —</div>
    </div>

  </div>

  <script>
    // ── 持续飘落的樱花瓣（110片）──
    (function() {
      const n = 110, b = document.body;
      for (let i = 0; i < n; i++) {
        const el = document.createElement('div');
        el.className = 'petal';
        const sz = 5 + Math.random() * 15;
        const x = Math.random() * 110 - 5;
        const y = Math.random() * -60;
        const dur = 14 + Math.random() * 12;
        const del = Math.random() * 35;
        const h = 320 + Math.random() * 30, s = 45 + Math.random() * 35, l = 68 + Math.random() * 22;
        const op = 0.3 + Math.random() * 0.5;
        const bt = 30 + Math.random() * 40;
        const bb = 30 + Math.random() * 40;

        el.style.cssText =
          `left:${x}vw;top:${y}px;width:${sz}px;height:${sz*(0.5+Math.random()*0.6)}px;` +
          `background:hsla(${h},${s}%,${l}%,${op});border-radius:${bt}% 0 ${bb}% 0;` +
          `animation:pf${i} ${dur}s ${del}s infinite`;

        const drift = -40 + Math.random() * 80;
        const rotTotal = 180 + Math.random() * 540;
        const tf = ['linear','cubic-bezier(0.25,0.3,0.45,1)','cubic-bezier(0.2,0.35,0.4,1)'][Math.floor(Math.random()*3)];

        const st = document.createElement('style');
        st.textContent =
          `@keyframes pf${i}{` +
          `0%{transform:translateY(0) translateX(0) rotate(0deg) scaleX(1);opacity:0}` +
          `3%{opacity:${op}}` +
          `50%{transform:translateY(50vh) translateX(${drift*0.4}px) rotate(${rotTotal*0.4}deg) scaleX(${0.6+Math.random()*0.3});opacity:${op}}` +
          `100%{transform:translateY(110vh) translateX(${drift}px) rotate(${rotTotal}deg) scaleX(${0.4+Math.random()*0.3});opacity:0;animation-timing-function:${tf}}` +
          `}`;
        document.head.appendChild(st);
        b.appendChild(el);
      }
    })();

    // ── 浮动微尘 ──
    (function() {
      const n = 12;
      for (let i = 0; i < n; i++) {
        const d = document.createElement('div');
        d.className = 'dust';
        const sz = 2 + Math.random() * 5;
        const x = Math.random() * 100;
        const y = 60 + Math.random() * 40;
        const dur = 14 + Math.random() * 14;
        const del = Math.random() * 20;
        d.style.cssText =
          `left:${x}vw;top:${y}vh;width:${sz}px;height:${sz}px;` +
          `background:hsla(${330+Math.random()*30},60%,80%,0.1);` +
          `animation:dustFloat ${dur}s ${del}s infinite`;
        document.body.appendChild(d);
      }
    })();

    // ── 风效 ──
    (function() {
      const b = document.body;
      let sid = 0;

      function rpp() {
        const sz = 5 + Math.random() * 15;
        const h = 310 + Math.random() * 35, s = 45 + Math.random() * 35, l = 65 + Math.random() * 25;
        return { w:sz, h:sz*(0.5+Math.random()*0.6), bg:`hsla(${h},${s}%,${l}%,${0.3+Math.random()*0.5})`, bt:30+Math.random()*40, bb:30+Math.random()*40 };
      }

      function swirl() {
        const n = 28, cx = 15 + Math.random() * 70, id = 'sw' + (sid++), dur = 2.5 + Math.random() * 1.5, spread = 40 + Math.random() * 40;
        for (let i = 0; i < n; i++) {
          const p = rpp(), el = document.createElement('div');
          el.className = 'petal';
          const ang = (i / n) * 360, rB = 5 + Math.random() * 15, rT = spread + Math.random() * 25, sd = (i / n) * 0.25, rise = 35 + Math.random() * 25;
          el.style.cssText = `left:${cx}vw;top:${50+Math.random()*25}vh;width:${p.w}px;height:${p.h}px;background:${p.bg};border-radius:${p.bt}% 0 ${p.bb}% 0;animation:${id}_${i} ${dur}s ${sd}s ease-in-out 1 forwards`;
          const a1=ang,a2=ang+90,a3=ang+180,a4=ang+270,a5=ang+380;
          const r1=rB,r2=rB+(rT-rB)*0.3,r3=rB+(rT-rB)*0.6,r4=rT*0.85,r5=rT*1.1,blow=-80+Math.random()*160;
          const st = document.createElement('style');
          st.textContent = `@keyframes ${id}_${i}{0%{transform:translate(0,0) rotate(${a1}deg);opacity:0}8%{opacity:0.7}25%{transform:translate(${Math.cos(a1*Math.PI/180)*r1}px,${-rise*0.2}px) rotate(${a2}deg);opacity:0.85}45%{transform:translate(${Math.cos(a2*Math.PI/180)*r2}px,${-rise*0.4}px) rotate(${a3}deg);opacity:0.8}62%{transform:translate(${Math.cos(a3*Math.PI/180)*r3}px,${-rise*0.6}px) rotate(${a4}deg);opacity:0.7}80%{transform:translate(${Math.cos(a4*Math.PI/180)*r4}px,${-rise*0.8}px) rotate(${a5}deg);opacity:0.5}100%{transform:translate(${blow}px,${-rise}px) rotate(${a5+180}deg);opacity:0}}`;
          document.head.appendChild(st);
          b.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.removeChild(el); }, (dur + sd) * 1000 + 200);
        }
      }

      function burst() {
        const n = 200 + Math.floor(Math.random() * 150), id = 'bu' + (sid++);
        for (let i = 0; i < n; i++) {
          const p = rpp(), el = document.createElement('div');
          el.className = 'petal';
          const sx=140+Math.random()*40, sy=-90-Math.random()*30, dl=Math.random()*1.2;
          const type = Math.floor(Math.random()*3);
          let dur, hE, vE, re, tf;
          if(type===0){dur=6+Math.random()*4;hE=-220-Math.random()*40;vE=170+Math.random()*40;re=300+Math.random()*500;tf='cubic-bezier(0.25,0.3,0.4,1)'}
          else if(type===1){dur=4+Math.random()*3;hE=-190-Math.random()*30;vE=180+Math.random()*30;re=400+Math.random()*600;tf='cubic-bezier(0.2,0.4,0.35,1)'}
          else{dur=3+Math.random()*2;hE=-160-Math.random()*25;vE=190+Math.random()*30;re=150+Math.random()*300;tf='cubic-bezier(0.15,0.5,0.3,1)'}
          const mH=hE*(0.4+Math.random()*0.15)+(Math.random()-0.5)*25,mV=vE*(0.45+Math.random()*0.1);
          const lH=hE*(0.7+Math.random()*0.1)+(Math.random()-0.5)*15,lV=vE*(0.7+Math.random()*0.1);
          const mR=re*(0.35+Math.random()*0.15),lR=re*(0.65+Math.random()*0.15);
          el.style.cssText=`left:${sx}vw;top:${sy}vh;width:${p.w}px;height:${p.h}px;background:${p.bg};border-radius:${p.bt}% 0 ${p.bb}% 0;animation:${id}_${i} ${dur}s ${dl}s ${tf} 1 forwards`;
          const st=document.createElement('style');
          st.textContent=`@keyframes ${id}_${i}{0%{transform:translateX(0)translateY(0)rotate(0deg);opacity:0}4%{opacity:0.8}40%{transform:translateX(${mH}vw)translateY(${mV}vh)rotate(${mR}deg);opacity:0.7}75%{transform:translateX(${lH}vw)translateY(${lV}vh)rotate(${lR}deg);opacity:0.4}100%{transform:translateX(${hE}vw)translateY(${vE}vh)rotate(${re}deg);opacity:0}}`;
          document.head.appendChild(st);
          b.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.removeChild(el); }, (dur+dl)*1000+300);
        }
      }

      function next(){setTimeout(()=>{Math.random()<0.4?swirl():burst();next()},15000+Math.random()*20000)}
      next();
    })();

    // ── 滚动视差 + 翻页淡入 ──
    (function() {
      const pages = document.querySelector('.pages');
      const bg = document.getElementById('bgParallax');

      if (pages && bg) {
        pages.addEventListener('scroll', function() {
          const scrollTop = this.scrollTop;
          const maxScroll = this.scrollHeight - this.clientHeight;
          const progress = maxScroll > 0 ? scrollTop / maxScroll : 0;
          bg.style.transform = 'translateY(' + (-progress * 30) + 'px) scale(1.05)';
        });
      }

      // 后续页淡入
      const contentPages = document.querySelectorAll('.page:not(.page-1)');
      if (contentPages.length) {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
            }
          });
        }, { threshold: 0.3 });
        contentPages.forEach(p => obs.observe(p));
      }
    })();

    // ── 第一页动画：每次翻回来重新播放 ──
    (function() {
      const page1 = document.querySelector('.page-1');
      if (!page1) return;

      const targets = {
        title: page1.querySelector('.en-title'),
        divider: page1.querySelector('.divider'),
        sub: page1.querySelector('.cn-sub'),
        back: page1.querySelector('.back')
      };

      // 保存原始 animation 值
      const origAnim = {};
      for (const [k, el] of Object.entries(targets)) {
        if (el) origAnim[k] = el.style.animation || getComputedStyle(el).animation;
      }

      function restartAnims() {
        for (const el of Object.values(targets)) {
          if (!el) continue;
          el.style.animation = 'none';
        }
        // 强制 reflow
        void page1.offsetHeight;
        // 还原动画（使用原来 CSS class 中的 animation，重置 style）
        if (targets.title) targets.title.style.animation = '';
        if (targets.divider) targets.divider.style.animation = '';
        if (targets.sub) targets.sub.style.animation = '';
        if (targets.back) targets.back.style.animation = '';
      }

      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) restartAnims();
        });
      }, { threshold: 0.3 });

      obs.observe(page1);
    })();
  </script>

</body>
</html>
