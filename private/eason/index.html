<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Eason · 私藏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d0716;
      --pink: #ff3388;
      --cyan: #00ddff;
      --purple: #9955dd;
      --white: #f0f0ff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        linear-gradient(135deg, rgba(13,7,22,0.55), rgba(13,7,22,0.6)),
        url('../../assets/bg-cyberpunk.jpg') center/cover no-repeat;
      filter: blur(3px);
      animation: bgBrightness 6s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
      animation: bgBreath 6s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes bgBrightness {
      0% { filter: blur(3px) brightness(0.35); }
      100% { filter: blur(3px) brightness(1.3); }
    }
    @keyframes bgBreath {
      0% { opacity: 0.92; }
      100% { opacity: 0.05; }
    }
    .container { max-width: 600px; text-align: center; }
    h1 {
      font-size: 36px; font-weight: 900; letter-spacing: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      background-clip: text; -webkit-background-clip: text; color: transparent;
      margin-bottom: 12px;
    }
    p { color: rgba(240,240,255,0.5); font-size: 14px; letter-spacing: 4px; margin-bottom: 32px; }
    .back {
      display: inline-block;
      padding: 8px 24px;
      border: 1px solid rgba(0,221,255,0.2);
      color: var(--dim-cyan); text-decoration: none;
      font-size: 12px; letter-spacing: 3px; border-radius: 4px;
      transition: all 0.2s;
    }
    .back:hover { border-color: var(--cyan); color: var(--cyan); }
  </style>
</head>
<body>
  <div class="container">
    <h1>EASON</h1>
    <p>✦ 私藏空间 ✦</p>
    <p style="font-size:13px;color:rgba(240,240,255,0.3);letter-spacing:2px;margin-bottom:40px">
      这里还没有内容，等待填充……
    </p>
    <a href="/" class="back" id="backLink">← BACK</a>
  <script>
    var p = new URLSearchParams(location.search);
    if (p.get('from') === 'gh') {
      document.getElementById('backLink').href = 'https://galateaye749.github.io/personal/';
    }
  </script>
  </div>
  </div>
</body>
</html>
