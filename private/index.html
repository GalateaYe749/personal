<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>私藏 · Galatea</title>
  <style>
    :root {
      --ink: #2c2c2c;
      --ink-light: #888;
      --paper: #1a1a2e;
      --card: #16213e;
      --accent: #e2b96f;
      --border: #2a2a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", Georgia, serif;
      background: var(--paper);
      color: #e8e4dc;
      line-height: 1.8;
      min-height: 100vh;
    }
    .container { max-width: 700px; margin: 0 auto; padding: 60px 24px; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 40px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .top-bar .title {
      font-size: 18px; letter-spacing: 4px; color: var(--accent);
    }
    .top-bar a {
      color: var(--ink-light); text-decoration: none; font-size: 13px;
      padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px;
    }
    .top-bar a:hover { color: var(--accent); border-color: var(--accent); }

    .module-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .module {
      background: var(--card); border-radius: 8px; padding: 24px;
      border: 1px solid var(--border); text-decoration: none; color: inherit;
      transition: all 0.2s;
    }
    .module:hover {
      border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(226,185,111,0.1);
    }
    .module .emoji { font-size: 28px; margin-bottom: 8px; }
    .module h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .module p { font-size: 13px; color: var(--ink-light); }

    @media (max-width: 520px) {
      .module-grid { grid-template-columns: 1fr; }
      .container { padding: 32px 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <span class="title">✦ 私藏</span>
    <a href="../">← 返回首页</a>
  </div>

  <div class="module-grid">

    <a class="module" href="notes.html">
      <div class="emoji">📖</div>
      <h3>笔记</h3>
      <p>课程笔记 · 读书摘录 · 复习资料</p>
    </a>

    <a class="module" href="projects.html">
      <div class="emoji">🛠</div>
      <h3>项目</h3>
      <p>技术尝试 · 工具 · 小实验</p>
    </a>

    <a class="module" href="#" style="opacity:0.4;cursor:default">
      <div class="emoji">✍️</div>
      <h3>写作</h3>
      <p>随笔 · 诗词 · 草稿</p>
    </a>

    <a class="module" href="#" style="opacity:0.4;cursor:default">
      <div class="emoji">🗂</div>
      <h3>归档</h3>
      <p>文件 · 链接 · 收藏</p>
    </a>

  </div>

</div>

<script>
// 未认证则跳回首页
if (!sessionStorage.getItem("auth")) {
  location.href = "../";
}
</script>
</body>
</html>
