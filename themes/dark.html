<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>方案B · 星夜 · Galatea</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, serif;
      background: #1a1a2e;
      color: #d8d4cc;
      line-height: 1.8;
      min-height: 100vh;
    }
    .bg-particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at 20% 30%, rgba(226,185,111,0.4), transparent),
        radial-gradient(1px 1px at 40% 70%, rgba(226,185,111,0.3), transparent),
        radial-gradient(1px 1px at 60% 20%, rgba(226,185,111,0.3), transparent),
        radial-gradient(1px 1px at 80% 50%, rgba(226,185,111,0.2), transparent),
        radial-gradient(1px 1px at 10% 80%, rgba(226,185,111,0.2), transparent),
        radial-gradient(1px 1px at 70% 90%, rgba(226,185,111,0.15), transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 30% 60%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.2), transparent);
    }
    .wrapper { max-width: 660px; margin: 0 auto; padding: 80px 24px 40px; position: relative; z-index: 1; }

    .header { text-align: center; margin-bottom: 48px; }
    .avatar {
      width: 72px; height: 72px; margin: 0 auto 16px;
      border: 2px solid #e2b96f; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #e2b96f; font-size: 24px; letter-spacing: 2px;
    }
    h1 { font-size: 28px; font-weight: 300; letter-spacing: 10px; color: #f0e8d8; }
    .divider { width: 40px; height: 1px; background: #e2b96f; margin: 14px auto; opacity: 0.6; }
    .sub { font-size: 13px; color: #8888aa; letter-spacing: 4px; }

    .bio { text-align: center; font-size: 14px; color: #a8a4b0; margin-bottom: 40px; }

    section { margin-bottom: 28px; }
    .sec-title {
      font-size: 12px; letter-spacing: 5px; color: #8888aa;
      margin-bottom: 10px; text-transform: uppercase;
    }
    .card {
      background: rgba(22,33,62,0.8); border-radius: 8px; padding: 16px 20px;
      border: 1px solid rgba(226,185,111,0.1); margin-bottom: 8px;
      transition: all 0.2s;
    }
    .card:hover { border-color: rgba(226,185,111,0.3); }
    .card h3 { font-size: 15px; font-weight: 400; color: #e8e0d0; }
    .card p { font-size: 13px; color: #8888aa; }

    .key-area { text-align: center; margin-top: 36px; }
    .key-box { display: flex; gap: 8px; max-width: 300px; margin: 8px auto 0; }
    .key-box input {
      flex: 1; padding: 8px 14px; background: rgba(22,33,62,0.8);
      border: 1px solid rgba(226,185,111,0.2); border-radius: 6px;
      font-size: 14px; color: #e8e0d0; outline: none; font-family: inherit;
    }
    .key-box input:focus { border-color: #e2b96f; }
    .key-box button {
      padding: 8px 20px; background: #e2b96f; color: #1a1a2e;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
      font-weight: 600; font-family: inherit;
    }
    .key-box button:hover { background: #d4aa50; }
    .key-err { color: #d07050; font-size: 13px; display: none; margin-top: 4px; }

    .footer { text-align: center; margin-top: 48px; padding-top: 20px; border-top: 1px solid rgba(226,185,111,0.1); }
    .footer p { color: #666680; font-size: 12px; }

    @media (max-width: 520px) {
      .wrapper { padding: 40px 16px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="bg-particles"></div>
<div class="wrapper">
  <div class="header">
    <div class="avatar">G</div>
    <h1>Galatea</h1>
    <div class="divider"></div>
    <p class="sub">学生 · 文学 · 技术</p>
  </div>

  <div class="bio"><p>好读书，不求甚解。录所得、所思，与技术探索。</p></div>

  <section>
    <div class="sec-title">方向</div>
    <div class="card"><h3>文学 · 古代文论</h3><p>唐诗 · 文本细读</p></div>
    <div class="card"><h3>技术 · 自动化</h3><p>前端 · 小工具</p></div>
  </section>

  <section>
    <div class="sec-title">项目</div>
    <div class="card"><h3>图书馆座位预约</h3><p>ZJU 主馆 · 实时监控 · 自动通知</p></div>
    <div class="card"><h3>学在浙大自动签到</h3><p>雷达签到 · 守护进程</p></div>
    <div class="card"><h3>个人网站</h3><p>GitHub Pages · 持续更新</p></div>
  </section>

  <div class="key-area">
    <p style="font-size:13px;color:#8888aa">🔑 私藏</p>
    <div class="key-box">
      <input type="password" id="k" placeholder="密钥" />
      <button onclick="go()">进入</button>
    </div>
    <p class="key-err" id="err">密钥错误</p>
  </div>

  <div class="footer"><p>© 2026 Galatea</p></div>
</div>
<script>
async function go() {
  const input = document.getElementById("k").value;
  const h = Array.from(new Uint8Array(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(input)))).map(b=>b.toString(16).padStart(2,"0")).join("");
  const h1="a853266afd09704859eabc86c9ca7c3a",h2="fc8f1408672359acb389f195424c22a2";
  if(h===h1+h2){sessionStorage.setItem("auth","1");location.href="../private/"}else{document.getElementById("err").style.display="block"}
}
</script>
</body>
</html>
