<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galatea</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;700;900&family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080406;
      --card: #0f080a;
      --crimson: #cc1133;
      --warm: #ff8890;
      --pale: #ffd0d0;
      --gold: #d4a050;
      --rose: #ff4060;
    }

    body {
      font-family: "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: #e8d8d0;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== BG 背景层 ===== */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    /* 大斜切撕裂 */
    .bg-layer .slash1 {
      position: absolute; top: 0; right: -10%; width: 50%; height: 100%;
      background: linear-gradient(180deg, rgba(204,17,51,0.08), transparent 60%);
      transform: skewX(-12deg);
    }
    .bg-layer .slash2 {
      position: absolute; bottom: 0; left: -10%; width: 40%; height: 60%;
      background: linear-gradient(0deg, rgba(255,136,144,0.05), transparent);
      transform: skewX(18deg);
    }
    /* 底部光晕 */
    .bg-layer .glow {
      position: absolute; bottom: -20%; left: 50%; translate: -50% 0;
      width: 80%; height: 50%;
      background: radial-gradient(ellipse, rgba(204,17,51,0.08), transparent 70%);
    }
    /* 网格（只中间可见） */
    .bg-layer .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(204,17,51,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(204,17,51,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 30%, transparent 70%);
    }

    .container { max-width: 640px; margin: 0 auto; padding: 48px 24px; position: relative; z-index: 1; }

    /* ===== HERO ===== */
    .hero { margin-bottom: 36px; position: relative; }

    .hero .name-block {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 4px;
    }
    .hero .name-block .initial {
      font-size: 52px; font-weight: 900;
      background: linear-gradient(180deg, var(--pale), var(--rose));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      letter-spacing: -2px;
    }
    .hero .name-block .rest {
      font-size: 24px; font-weight: 300; letter-spacing: 14px;
      color: var(--pale);
      opacity: 0.6;
    }
    .hero .tagline {
      font-family: "Share Tech Mono", monospace;
      font-size: 11px; color: rgba(255,136,144,0.4);
      letter-spacing: 6px; margin-top: 2px;
    }
    .hero .desc {
      font-size: 14px; color: rgba(255,208,208,0.5);
      font-weight: 300; margin-top: 12px;
      max-width: 70%;
    }

    /* ===== 撕裂色块条 ===== */
    .tear-strip {
      display: flex; gap: 4px; margin: 20px 0 28px; height: 6px;
    }
    .tear-strip span {
      height: 100%; border-radius: 2px;
    }
    .tear-strip .t1 { flex: 3; background: var(--crimson); }
    .tear-strip .t2 { flex: 5; background: linear-gradient(90deg, var(--crimson), var(--gold)); }
    .tear-strip .t3 { flex: 2; background: var(--gold); opacity: 0.6; }
    .tear-strip .t4 { flex: 4; background: linear-gradient(90deg, var(--gold), transparent); opacity: 0.3; }

    /* ===== Tags ===== */
    .tag-strip {
      display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 28px;
    }
    .tag-strip a {
      font-family: "Share Tech Mono", monospace;
      font-size: 10px; padding: 4px 10px; letter-spacing: 1px;
      text-decoration: none; transition: all 0.2s;
    }
    .tag-strip a.solid {
      background: var(--crimson); color: #fff;
    }
    .tag-strip a.border {
      border: 1px solid rgba(204,17,51,0.2); color: rgba(255,136,144,0.5);
    }
    .tag-strip a:hover { filter: brightness(1.3); }

    /* ===== 项目卡片 - 横向 ===== */
    .project-strip {
      display: flex; flex-direction: column; gap: 2px; margin-bottom: 28px;
    }
    .project-strip .row {
      display: flex; gap: 2px;
    }
    .project-strip .row .item {
      flex: 1; padding: 14px 16px;
      background: var(--card);
      border: 1px solid rgba(204,17,51,0.04);
      text-decoration: none; color: inherit;
      transition: all 0.25s; position: relative; overflow: hidden;
    }
    .project-strip .row .item:hover {
      background: #14080a;
      border-color: rgba(255,136,144,0.12);
    }
    .project-strip .row .item:hover .icon { opacity: 1; }
    .project-strip .row .item .icon { font-size: 18px; margin-bottom: 4px; opacity: 0.5; transition: opacity 0.2s; }
    .project-strip .row .item .label { font-size: 13px; font-weight: 600; }
    .project-strip .row .item .sub { font-size: 11px; color: rgba(255,208,208,0.35); font-weight: 300; }

    /* ===== Stats Bar ===== */
    .stats-bar {
      display: flex; gap: 2px; margin-bottom: 28px;
    }
    .stats-bar .s {
      flex: 1; text-align: center; padding: 12px 4px;
      background: var(--card);
      border: 1px solid rgba(204,17,51,0.04);
    }
    .stats-bar .s .num {
      font-family: "Share Tech Mono", monospace;
      font-size: 22px; font-weight: 700;
      background: linear-gradient(180deg, var(--pale), var(--rose));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stats-bar .s .lbl {
      font-size: 9px; color: rgba(255,136,144,0.3);
      font-family: "Share Tech Mono", monospace;
      letter-spacing: 2px; margin-top: 2px;
    }

    /* ===== Key Area - 更视觉化的密码入口 ===== */
    .key-block {
      margin-top: 8px;
      border: 1px solid rgba(204,17,51,0.08);
      background: rgba(204,17,51,0.02);
      padding: 24px;
      position: relative;
    }
    .key-block .top-line {
      position: absolute; top: 0; left: 10%; width: 80%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--crimson), var(--gold), transparent);
    }
    .key-block .hint {
      font-family: "Share Tech Mono", monospace;
      font-size: 11px; color: rgba(255,136,144,0.3);
      letter-spacing: 3px; margin-bottom: 10px;
    }
    .key-block .hint span { color: var(--rose); }
    .key-box { display: flex; gap: 6px; max-width: 340px; }
    .key-box input {
      flex: 1; padding: 10px 14px;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(204,17,51,0.12);
      color: var(--pale); font-size: 14px; outline: none;
      font-family: "Share Tech Mono", monospace;
    }
    .key-box input:focus { border-color: var(--rose); }
    .key-box button {
      padding: 10px 22px;
      background: linear-gradient(135deg, var(--crimson), var(--rose));
      color: #fff; border: none; cursor: pointer;
      font-family: "Share Tech Mono", monospace;
      font-size: 11px; letter-spacing: 3px;
      transition: all 0.3s;
    }
    .key-box button:hover { filter: brightness(1.2); }
    .key-err { font-family: "Share Tech Mono", monospace; font-size: 11px; color: var(--rose); display: none; margin-top: 6px; }

    /* ===== Footer ===== */
    .foot {
      margin-top: 36px; padding-top: 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(204,17,51,0.04);
    }
    .foot .links a {
      color: rgba(255,136,144,0.25); text-decoration: none;
      font-family: "Share Tech Mono", monospace;
      font-size: 11px; margin-right: 14px; transition: color 0.2s;
    }
    .foot .links a:hover { color: var(--rose); }
    .foot .copy {
      font-family: "Share Tech Mono", monospace;
      font-size: 10px; color: rgba(255,136,144,0.15);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 520px) {
      .container { padding: 32px 14px; }
      .hero .name-block .initial { font-size: 38px; }
      .hero .name-block .rest { font-size: 18px; letter-spacing: 8px; }
      .hero .desc { max-width: 100%; }
      .project-strip .row { flex-direction: column; }
      .stats-bar { flex-wrap: wrap; }
      .stats-bar .s { min-width: 80px; }
    }
  </style>
</head>
<body>

<div class="bg-layer">
  <div class="slash1"></div>
  <div class="slash2"></div>
  <div class="glow"></div>
  <div class="grid"></div>
</div>

<div class="container">
  <!-- Hero -->
  <div class="hero">
    <div class="name-block">
      <span class="initial">G</span>
      <span class="rest">ALATEA</span>
    </div>
    <div class="tagline">// STUDENT · LITERATURE · TECH</div>
    <div class="desc">好读书，不求甚解。录所得、所思，与技术探索。</div>
  </div>

  <!-- Tear Strip -->
  <div class="tear-strip">
    <span class="t1"></span>
    <span class="t2"></span>
    <span class="t3"></span>
    <span class="t4"></span>
  </div>

  <!-- Tags -->
  <div class="tag-strip">
    <a class="solid" href="#">唐诗</a>
    <a class="border" href="#">古代文论</a>
    <a class="border" href="#">自动化</a>
    <a class="border" href="#">Node.js</a>
    <a class="border" href="#">API</a>
  </div>

  <!-- Projects -->
  <div class="project-strip">
    <div class="row">
      <a class="item" href="#">
        <div class="icon">📚</div>
        <div class="label">座位预约</div>
        <div class="sub">ZJU图书馆 · AES加密</div>
      </a>
      <a class="item" href="#">
        <div class="icon">✍️</div>
        <div class="label">自动签到</div>
        <div class="sub">学在浙大 · 雷达定位</div>
      </a>
    </div>
    <div class="row">
      <a class="item" href="#">
        <div class="icon">🌐</div>
        <div class="label">个人站</div>
        <div class="sub">GitHub Pages</div>
      </a>
      <a class="item" href="#">
        <div class="icon">📖</div>
        <div class="label">笔记</div>
        <div class="sub">读书摘录 · 复习资料</div>
      </a>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="s"><div class="num">4</div><div class="lbl">项目</div></div>
    <div class="s"><div class="num">∞</div><div class="lbl">探索</div></div>
    <div class="s"><div class="num">1</div><div class="lbl">网站</div></div>
    <div class="s"><div class="num">?</div><div class="lbl">待续</div></div>
  </div>

  <!-- Key -->
  <div class="key-block">
    <div class="top-line"></div>
    <div class="hint">// <span>UNLOCK</span> 私藏区域</div>
    <div class="key-box">
      <input type="password" id="k" placeholder="KEY" autocomplete="off" onkeydown="if(event.key==='Enter')unlock()" />
      <button onclick="unlock()">→</button>
    </div>
    <p class="key-err" id="err">// ACCESS DENIED</p>
  </div>

  <!-- Footer -->
  <div class="foot">
    <div class="links">
      <a href="https://github.com/GalateaYe749">GitHub</a>
      <a href="mailto:galatea@zju.edu.cn">Email</a>
    </div>
    <div class="copy">© 2026</div>
  </div>
</div>

<script>
async function unlock() {
  const input = document.getElementById("k").value;
  const hash = Array.from(new Uint8Array(
    await crypto.subtle.digest("SHA-256", new TextEncoder().encode(input))
  )).map(b => b.toString(16).padStart(2,"0")).join("");
  const h1="a853266afd09704859eabc86c9ca7c3a",h2="fc8f1408672359acb389f195424c22a2";
  if (hash === h1+h2) { sessionStorage.setItem("auth","1"); location.href="../private/"; }
  else { document.getElementById("err").style.display="block"; setTimeout(()=>document.getElementById("err").style.display="none",2000); }
}
</script>
</body>
</html>
