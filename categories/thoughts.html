<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galatea · 随想摘要</title>
  <style>
    @font-face {
      font-family: 'STCaiyun';
      src: url('../assets/STCAIYUN.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0716;
      --pink: #ff3388;
      --cyan: #00ddff;
      --purple: #9955dd;
      --light-pink: #ff99cc;
      --white: #f0f0ff;
      --dim-pink: rgba(255,51,136,0.4);
      --dim-cyan: rgba(0,221,255,0.4);
      --dim-purple: #ffbe6e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--white);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ===== 赛博霓虹边框 ===== */
    .cyber-border {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      border: 4px solid transparent;
      border-radius: 8px;
      background: 
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--pink), var(--cyan), var(--purple), var(--pink)) border-box;
      -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      animation: borderGlow 5s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes borderGlow {
      0%,100% { filter: drop-shadow(0 0 6px rgba(255,51,136,0.1)); }
      50% { filter: drop-shadow(0 0 12px rgba(0,221,255,0.1)); }
    }
    .corner {
      position: fixed; width: 36px; height: 36px; z-index: 0; pointer-events: none;
      border: 2px solid var(--pink);
      opacity: 0.5;
    }
    .corner-tl { top: 6px; left: 6px; border-right: none; border-bottom: none; }
    .corner-tr { top: 6px; right: 6px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 6px; left: 6px; border-right: none; border-top: none; }
    .corner-br { bottom: 6px; right: 6px; border-left: none; border-top: none; }
    .corner .dot {
      position: absolute; width: 4px; height: 4px; background: var(--cyan); border-radius: 50%;
      opacity: 0.8;
      animation: dotBlink 2s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .corner-tl .dot { bottom: 4px; right: 4px; animation-delay: 0s; }
    .corner-tr .dot { bottom: 4px; left: 4px; animation-delay: 0.5s; }
    .corner-bl .dot { top: 4px; right: 4px; animation-delay: 1s; }
    .corner-br .dot { top: 4px; left: 4px; animation-delay: 1.5s; }

    /* ===== 星尘粒子画布 ===== */
    #particle-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ===== 背景 ===== */
    .bg {
      position: fixed; inset: 0; z-index: -2;
      background:
        linear-gradient(135deg, rgba(13,7,22,0.55), rgba(13,7,22,0.6)),
        url('../assets/bg-cyberpunk.jpg') center/cover no-repeat;
      filter: blur(3px);
      animation: bgBrightness 6s ease-in-out infinite alternate;
    }
    @keyframes bgBrightness {
      0% { filter: blur(3px) brightness(0.35); }
      100% { filter: blur(3px) brightness(1.3); }
    }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
      animation: bgBreath 6s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes bgBreath {
      0% { opacity: 0.92; }
      100% { opacity: 0.05; }
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,51,136,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,221,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black, transparent 70%);
    }

    /* ===== 光标光晕 ===== */
    .cursor-glow {
      position: fixed;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, 
        rgba(255,51,136,0.2) 0%,
        rgba(255,153,204,0.1) 20%,
        rgba(0,221,255,0.06) 40%,
        transparent 65%
      );
      pointer-events: none;
      z-index: 5;
      transform: translate(-50%, -50%);
      transition: left 0.15s ease-out, top 0.15s ease-out;
      mix-blend-mode: screen;
      filter: blur(20px);
    }

    /* ===== CRT 扫描线 ===== */
    .scanlines {
      position: fixed; inset: 0;
      z-index: 3;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* ===== 内容容器 ===== */
    .container {
      position: relative;
      z-index: 10;
      max-width: 600px;
      width: 90%;
      text-align: center;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }

    /* ===== 霓虹标题 ===== */
    .neon-sign-title {
      font-family: 'STCaiyun';
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 18px;
      margin-bottom: 30px;
      line-height: 1.2;
      -webkit-text-stroke: 0.8px currentColor;
      paint-order: stroke;
    }
    .ns-gold .neon-sign-title { 
      color: var(--pink); 
      text-shadow: 
        0 0 2px rgba(255,51,136,0.9),
        0 0 8px rgba(255,51,136,0.6),
        0 0 18px rgba(255,51,136,0.3);
    }
    .ns-cyan .neon-sign-title { 
      color: var(--cyan); 
      text-shadow: 
        0 0 2px rgba(0,221,255,0.9),
        0 0 8px rgba(0,221,255,0.6),
        0 0 18px rgba(0,221,255,0.3);
    }
    .ns-purple .neon-sign-title { 
      color: #d4bbff; 
      text-shadow: 
        0 0 2px rgba(153,85,221,0.9),
        0 0 8px rgba(153,85,221,0.6),
        0 0 18px rgba(153,85,221,0.3);
    }
    .ns-lpink .neon-sign-title { 
      color: var(--light-pink); 
      text-shadow: 
        0 0 2px rgba(255,153,204,0.9),
        0 0 8px rgba(255,153,204,0.6),
        0 0 18px rgba(255,153,204,0.3);
    }
    .ns-gold .neon-sign-title { 
      color: #ffbe6e; 
      text-shadow: 
        0 0 2px rgba(255,190,110,0.9),
        0 0 8px rgba(255,190,110,0.6),
        0 0 18px rgba(255,190,110,0.3);
    }

    @keyframes textFlicker {
      0%, 80% { opacity: 1; text-shadow: inherit; }
      83% { opacity: 0.3; text-shadow: 0 0 6px currentColor; }
      85% { opacity: 0.9; text-shadow: 0 0 4px currentColor; }
      88% { opacity: 0.4; text-shadow: 0 0 8px currentColor; }
      91% { opacity: 1; text-shadow: inherit; }
    }
    .neon-sign-title.flicker { animation: textFlicker 8s ease-in-out infinite; }
    .neon-sign-title.flicker-delay { animation: textFlicker 9s ease-in-out 3s infinite; }
    .neon-sign-title.flicker-delay { animation: textFlicker 10s ease-in-out 1s infinite; }
    .neon-sign-title.flicker-d2 { animation: textFlicker 7s ease-in-out 4s infinite; }
    .neon-sign-title.flicker-d3 { animation: textFlicker 11s ease-in-out 6s infinite; }

    /* ===== 霓虹边框 ===== */
    .neon-sign {
      position: relative;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, rgba(20,12,30,0.7), rgba(13,7,22,0.5));
      backdrop-filter: blur(8px);
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
      transform: rotate(-1.5deg);
    }
    .neon-sign::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      border: 2.5px solid transparent;
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
      animation: neonFlicker1 10s infinite;
    }
    .neon-sign::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 8px;
      border: 2px solid currentColor;
      pointer-events: none;
      opacity: 0.5;
      animation: neonBreath 4s ease-in-out infinite;
      filter: drop-shadow(0 0 8px currentColor);
    }
    @keyframes neonFlicker1 {
      0%, 70% { opacity: 1; }
      72% { opacity: 0.4; }
      74% { opacity: 1; }
      76% { opacity: 0.5; }
      79% { opacity: 1; }
      92% { opacity: 1; }
      94% { opacity: 0.3; }
      96% { opacity: 0.9; }
      98% { opacity: 0.5; }
    }
    @keyframes neonBreath {
      0%, 100% { opacity: 0.5; filter: drop-shadow(0 0 6px currentColor); }
      50% { opacity: 0.9; filter: drop-shadow(0 0 18px currentColor) drop-shadow(0 0 6px currentColor); }
    }
    @keyframes neonPulsePink {
      0%,100% { opacity: 0.5; filter: drop-shadow(0 0 4px rgba(255,51,136,0.3)); }
      45% { opacity: 1; filter: drop-shadow(0 0 10px rgba(255,51,136,0.5)); }
      48% { opacity: 0.6; }
      50% { opacity: 1; }
      52% { opacity: 0.5; }
      55% { opacity: 1; filter: drop-shadow(0 0 10px rgba(255,51,136,0.5)); }
      70% { opacity: 0.9; }
    }
    @keyframes neonPulseCyan {
      0%,100% { opacity: 0.5; filter: drop-shadow(0 0 4px rgba(0,221,255,0.3)); }
      40% { opacity: 1; filter: drop-shadow(0 0 10px rgba(0,221,255,0.5)); }
      43% { opacity: 0.5; }
      45% { opacity: 1; }
      48% { opacity: 0.6; }
      50% { opacity: 1; filter: drop-shadow(0 0 10px rgba(0,221,255,0.5)); }
      65% { opacity: 0.85; }
    }
    @keyframes neonPulsePurple {
      0%,100% { opacity: 0.65; filter: drop-shadow(0 0 4px rgba(153,85,221,0.3)); }
      50% { opacity: 1; filter: drop-shadow(0 0 10px rgba(153,85,221,0.5)); }
      53% { opacity: 0.7; }
      55% { opacity: 1; filter: drop-shadow(0 0 10px rgba(153,85,221,0.5)); }
      60% { opacity: 0.9; }
    }
    @keyframes neonPulseGold {
      0%,100% { opacity: 0.7; filter: drop-shadow(0 0 4px rgba(255,190,110,0.3)); }
      35% { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,190,110,0.5)); }
      55% { opacity: 0.85; }
    }
    @keyframes neonPulseLpink {
      0%,100% { opacity: 0.7; filter: drop-shadow(0 0 4px rgba(255,153,204,0.3)); }
      30% { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,153,204,0.5)); }
      33% { opacity: 0.5; }
      35% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    .neon-border-gold::before {
      background: linear-gradient(135deg, var(--pink), #ff66aa, var(--pink)) border-box;
      background-size: 200% 200%;
      animation: neonPulsePink 3s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255,51,136,0.7)) drop-shadow(0 0 24px rgba(255,51,136,0.4));
    }
    .neon-border-cyan::before {
      background: linear-gradient(135deg, var(--cyan), #66eeff, var(--cyan)) border-box;
      background-size: 200% 200%;
      animation: neonPulseCyan 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(0,221,255,0.7)) drop-shadow(0 0 24px rgba(0,221,255,0.4));
    }
    .neon-border-purple::before {
      background: linear-gradient(135deg, var(--purple), #bb77ff, var(--purple)) border-box;
      background-size: 200% 200%;
      animation: neonPulsePurple 4s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(153,85,221,0.7)) drop-shadow(0 0 24px rgba(153,85,221,0.4));
    }
    .neon-border-lpink::before {
      background: linear-gradient(135deg, var(--light-pink), #ffbbdd, var(--light-pink)) border-box;
      background-size: 200% 200%;
      animation: neonPulseLpink 2.8s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255,153,204,0.7)) drop-shadow(0 0 24px rgba(255,153,204,0.4));
    }
    .neon-border-gold::before {
      background: linear-gradient(135deg, #ffbe6e, #ffdbaa, #ffbe6e) border-box;
      background-size: 200% 200%;
      animation: neonPulseGold 3.2s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255,190,110,0.7)) drop-shadow(0 0 24px rgba(255,190,110,0.4));
    }

    /* ===== 待施工文字 ===== */
    .coming-soon {
      margin-top: 20px;
      font-size: 16px;
      letter-spacing: 8px;
      color: rgba(240,240,255,0.3);
      font-family: "Consolas", "Monaco", monospace;
      text-shadow: 0 0 8px rgba(240,240,255,0.05);
    }
    .coming-soon span {
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* ===== 返回链接 ===== */
    .back-link {
      margin-top: 48px;
    }
    .back-link a {
      color: rgba(240,240,255,0.25);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 4px;
      font-family: "Consolas", "Monaco", monospace;
      transition: all 0.3s;
    }
    .back-link a:hover {
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0,221,255,0.3);
    }

    @media (max-width: 520px) {
      .neon-sign-title { font-size: 28px; letter-spacing: 10px; }
      .neon-sign { padding: 32px 24px; }
      .corner, .cyber-border { display: none; }
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>
<div class="scanlines"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="cyber-border"></div>
<div class="corner corner-tl"><div class="dot"></div></div>
<div class="corner corner-tr"><div class="dot"></div></div>
<div class="corner corner-bl"><div class="dot"></div></div>
<div class="corner corner-br"><div class="dot"></div></div>

<div class="container">
  <div class="neon-sign ns-gold neon-border-gold">
    <div class="neon-sign-title flicker-delay" data-text="随想摘要">随想摘要</div>
    <div class="coming-soon"><span>✦</span> 待施工 <span>✦</span></div>
  </div>
  <div class="back-link"><a href="../">← 返回主页</a></div>
</div>

<canvas id="particle-canvas"></canvas>
<script>
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const particleCount = 250;
const mouse = { x: -999, y: -999, radius: 180 };
let time = 0;

const palette = ['#ff3388', '#00ddff', '#9955dd', '#f0f0ff', '#ff99cc', '#ff66aa', '#66eeff'];

const nebulae = [];
for (let i = 0; i < 6; i++) {
  nebulae.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: 180 + Math.random() * 280,
    color: ['rgba(255,51,136,', 'rgba(0,221,255,', 'rgba(153,85,221,', 'rgba(255,153,204,'][i % 4],
    opacity: 0.15 + Math.random() * 0.15,
    speedX: (Math.random() - 0.5) * 0.15,
    speedY: (Math.random() - 0.5) * 0.15,
    phase: Math.random() * Math.PI * 2
  });
}

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3 + 0.5;
    this.baseSize = this.size;
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.speedY = (Math.random() - 0.5) * 0.6;
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.phase = Math.random() * Math.PI * 2;
    this.twinkleSpeed = 0.02 + Math.random() * 0.04;
    this.opacity = 0.4 + Math.random() * 0.6;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.phase += this.twinkleSpeed;
    this.size = this.baseSize + Math.sin(this.phase) * 0.4;
    this.currentOpacity = this.opacity * (0.7 + Math.sin(this.phase) * 0.3);
    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < mouse.radius && dist > 0) {
      const force = (mouse.radius - dist) / mouse.radius;
      this.x += (dx / dist) * force * 3;
      this.y += (dy / dist) * force * 3;
    }
  }
  draw() {
    ctx.globalAlpha = this.currentOpacity;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = this.size * 8;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

let shootingStars = [];
function spawnShootingStar() {
  if (Math.random() < 0.04 && shootingStars.length < 2) {
    const angle = Math.random() * 0.3 + 0.35;
    const speed = 7 + Math.random() * 4;
    const fromRight = Math.random() > 0.5;
    let x, y, vx, vy;
    if (fromRight) {
      x = canvas.width + 20 + Math.random() * 60;
      y = Math.random() * canvas.height * 0.5;
    } else {
      x = Math.random() * canvas.width * 0.5 + canvas.width * 0.3;
      y = -20 - Math.random() * 40;
    }
    vx = -Math.cos(angle) * speed;
    vy = Math.sin(angle) * speed;
    shootingStars.push({
      x, y, vx, vy,
      length: 80 + Math.random() * 60,
      color: ['#f0f0ff', '#ff99cc', '#66eeff'][Math.floor(Math.random() * 3)]
    });
  }
}

for (let i = 0; i < particleCount; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  time += 0.005;
  nebulae.forEach(n => {
    n.x += n.speedX + Math.sin(time + n.phase) * 0.1;
    n.y += n.speedY + Math.cos(time + n.phase) * 0.1;
    if (n.x < -n.radius) n.x = canvas.width + n.radius;
    if (n.x > canvas.width + n.radius) n.x = -n.radius;
    if (n.y < -n.radius) n.y = canvas.height + n.radius;
    if (n.y > canvas.height + n.radius) n.y = -n.radius;
    const gradient = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
    gradient.addColorStop(0, n.color + n.opacity + ')');
    gradient.addColorStop(0.4, n.color + (n.opacity * 0.4) + ')');
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  });
  for (let a = 0; a < particles.length; a++) {
    for (let b = a + 1; b < particles.length; b++) {
      const dx = particles[a].x - particles[b].x;
      const dy = particles[a].y - particles[b].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const alpha = (1 - dist / 120) * 0.2;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(200,200,255,${alpha})`;
        ctx.lineWidth = 0.4;
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
  particles.forEach(p => { p.update(); p.draw(); });
  spawnShootingStar();
  shootingStars = shootingStars.filter(s => {
    s.x += s.vx;
    s.y += s.vy;
    if (s.x < -200 || s.x > canvas.width + 200 || s.y > canvas.height + 200 || s.y < -200) return false;
    const gradient = ctx.createLinearGradient(s.x, s.y, s.x - s.vx / Math.hypot(s.vx, s.vy) * s.length, s.y - s.vy / Math.hypot(s.vx, s.vy) * s.length);
    gradient.addColorStop(0, s.color + '80');
    gradient.addColorStop(0.6, s.color + '20');
    gradient.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx / Math.hypot(s.vx, s.vy) * s.length, s.y - s.vy / Math.hypot(s.vx, s.vy) * s.length);
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 8;
    ctx.shadowColor = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.shadowBlur = 0;
    return true;
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', (e) => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});
</script>
</body>
</html>
